<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyecto Final – Firewall Docker & Netfilter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-page: #f2efe9;
    --bg-card: #ffffff;
    --bg-slide: #faf8f5;
    --text-dark: #2d2a26;
    --text-body: #4a4540;
    --text-muted: #7a736b;
    --accent: #e67e22;
    --accent-dark: #c25a1f;
    --accent-light: #fde8d8;
    --border: #e0d8cf;
    --border-light: #f0ebe3;
    --shadow: 0 2px 8px rgba(0,0,0,0.04);
    --shadow-md: 0 8px 24px rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-page);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1.5rem;
    color: var(--text-body);
    line-height: 1.8;
  }

  .presentation {
    max-width: 1200px;
    width: 100%;
    background: var(--bg-slide);
    box-shadow: 0 25px 60px rgba(0,0,0,0.1);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 88vh;
  }

  .presentation::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--accent), var(--accent-dark));
    z-index: 10;
  }

  .header {
    padding: 1.4rem 2.5rem;
    border-bottom: 1px solid var(--border-light);
    display: flex;
    align-items: center;
    gap: 1.2rem;
    background: var(--bg-card);
    flex-shrink: 0;
    box-shadow: var(--shadow);
  }
  .header .logo {
    width: 42px; height: 42px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    color: #fff;
    font-size: 1.3rem;
    font-family: 'Playfair Display', serif;
    border: none;
  }
  .header .title {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.4rem;
    color: var(--text-dark);
    letter-spacing: 1px;
  }
  .header .subtitle {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-left: auto;
  }

  .slides-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--bg-slide);
  }

  .slide {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    padding: 2.5rem 3rem;
    opacity: 0;
    transform: translateX(30px);
    transition: opacity 0.4s cubic-bezier(0.4,0,0.2,1), transform 0.4s cubic-bezier(0.4,0,0.2,1);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    pointer-events: none;
    background: var(--bg-slide);
  }
  .slide.active {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
    z-index: 1;
  }
  .slide::-webkit-scrollbar { width: 5px; }
  .slide::-webkit-scrollbar-track { background: transparent; }
  .slide::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 2.5rem;
    border-top: 1px solid var(--border-light);
    background: var(--bg-card);
    flex-shrink: 0;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.03);
  }
  button {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-body);
    padding: 0.6rem 1.5rem;
    border-radius: 30px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: var(--shadow);
  }
  button:hover {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent-dark);
    box-shadow: var(--shadow-md);
  }
  button:disabled {
    opacity: 0.3;
    pointer-events: none;
    box-shadow: none;
  }
  .page-indicator {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 0.85rem;
    color: var(--text-muted);
    background: var(--bg-slide);
    padding: 0.4rem 1.2rem;
    border-radius: 20px;
    border: 1px solid var(--border-light);
    letter-spacing: 0.5px;
  }

  /* Títulos */
  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 2.2rem;
    color: var(--text-dark);
    margin-bottom: 1.5rem;
    line-height: 1.2;
    position: relative;
  }
  h1::after {
    content: '';
    display: block;
    width: 60px;
    height: 3px;
    background: var(--accent);
    margin-top: 0.6rem;
  }
  h2 {
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 1.4rem;
    color: var(--text-dark);
    margin: 1.2rem 0 0.8rem;
    padding-left: 1rem;
    border-left: 4px solid var(--accent);
  }
  h3 {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    color: var(--accent-dark);
    margin: 1rem 0 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .decorative-line {
    font-family: 'Fira Code', monospace;
    color: var(--text-muted);
    opacity: 0.5;
    text-align: center;
    margin: 1rem 0;
    font-size: 0.8rem;
    letter-spacing: 2px;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-top: 1rem;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 12px;
    padding: 1.4rem;
    box-shadow: var(--shadow);
    transition: all 0.3s ease;
  }
  .card:hover {
    border-color: var(--accent);
    box-shadow: var(--shadow-md);
  }

  /* Tablas */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
    font-size: 0.9rem;
    box-shadow: var(--shadow);
    border-radius: 8px;
    overflow: hidden;
    background: var(--bg-card);
  }
  th {
    background: var(--accent);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 0.8rem 1rem;
    text-align: left;
    border: none;
  }
  td {
    padding: 0.7rem 1rem;
    border-bottom: 1px solid var(--border-light);
    background: var(--bg-card);
    font-family: 'Fira Code', monospace;
    font-size: 0.8rem;
    color: var(--text-body);
  }
  tr:last-child td {
    border-bottom: none;
  }
  tr:hover td {
    background: var(--accent-light);
  }

  /* Código */
  pre {
    background: #2b2520;
    border: 1px solid #3d3530;
    border-radius: 10px;
    padding: 1.2rem 1.5rem;
    font-family: 'Fira Code', monospace;
    font-size: 0.75rem;
    line-height: 1.7;
    overflow-x: auto;
    color: #f5e6d3;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 60vh;
    overflow-y: auto;
    box-shadow: var(--shadow-md);
  }

  .success { color: #2e7d32; font-weight: 600; }
  .fail { color: #c62828; font-weight: 600; }
  .highlight { color: var(--accent-dark); font-weight: 500; }

  /* Imágenes - CORREGIDO */
  img {
    max-width: 100%;
    height: auto;
    border-radius: 10px;
    border: 1px solid var(--border-light);
    box-shadow: var(--shadow);
    display: block; /* Elimina espacio extra */
  }

  /* Para imágenes dentro de grid-2, que ocupen el ancho de su columna */
  .grid-2 img {
    width: 100%;
    height: auto;
    object-fit: contain; /* Mantiene proporción sin recortar */
  }

  /* Contenedor para imágenes en diapositivas de resultados (opcional) */
  .img-container {
    margin: 1rem 0;
    width: 100%;
  }
  .img-container img {
    width: 100%;
    height: auto;
    object-fit: contain;
  }

  ul { margin-left: 1.5rem; line-height: 1.8; font-size: 0.95rem; color: var(--text-body); }
  ul li { margin-bottom: 0.3rem; }

  .command-line {
    background: #2b2520;
    border-left: 4px solid var(--accent);
    padding: 0.5rem 1rem;
    border-radius: 4px;
    font-family: 'Fira Code', monospace;
    font-size: 0.8rem;
    color: #f5e6d3;
    margin: 0.3rem 0;
  }

  @media (max-width: 800px) {
    .grid-2 { grid-template-columns: 1fr; }
    .slide { padding: 1.5rem; }
    h1 { font-size: 1.6rem; }
    .header .title { font-size: 1rem; }
    .controls { padding: 0.8rem 1.2rem; }
  }
</style>
</head>

<script>
// ============================================================
//  COPIA AQUÍ TU ARRAY 'slides' COMPLETO DESDE TU ARCHIVO ORIGINAL
//  (incluye todas las diapositivas con sus imágenes base64)
// ============================================================
const slides = [
  // Slide 0 – Portada
  `
    <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; height:100%;">
      <div style="font-size:3rem; margin-bottom:1.5rem; opacity:0.8;">🔒</div>
      <h1 style="font-size:2.8rem; text-align:center;">Firewall Centralizado</h1>
      <h2 style="border:none; font-size:1.8rem; color:var(--text-muted); margin-top:0.5rem; text-align:center;">Topología WAN · DMZ · LAN</h2>
      <p style="font-size:1.1rem; color:var(--text-muted); margin-top:1rem; font-weight:300; letter-spacing:0.5px;">Implementación con Docker, redes personalizadas e iptables (Netfilter)</p>
      <div class="decorative-line">────────────────────────────────────────</div>
      <div style="margin-top:2.5rem; font-family:'Playfair Display',serif; font-weight:700; font-size:1.4rem; color:var(--accent-dark);">CHAVEZ HUAMAN ADRIAN / PAREDES INGA JUAN JOSE</div>
      <div style="color:var(--text-muted); font-size:0.9rem; margin-top:0.3rem;">Redes y Seguridad · 2026</div>
    </div>
  `,
  // Slide 1 – Índice
  `
    <h1>Contenido</h1>
    <div class="grid-2">
      <div class="card">
        <h3>1. Código Fuente</h3>
        <ul><li>Dockerfile</li><li>firewall.sh</li><li>start_net.sh</li><li>index.html</li></ul>
      </div>
      <div class="card">
        <h3>2. Topología y Direccionamiento</h3>
        <ul><li>Segmentos WAN, DMZ, LAN</li><li>Asignación de IPs estáticas</li><li>Diagrama de red</li></ul>
      </div>
      <div class="card">
        <h3>3. Configuración del Firewall</h3>
        <ul><li>Política DROP por defecto</li><li>Reglas de filtrado por IP/puerto</li><li>ESTABLISHED, RELATED</li></ul>
      </div>
      <div class="card">
        <h3>4. Validación Experimental</h3>
        <ul><li>Pruebas de Reglas 1, 2 y 3</li><li>Evidencia con ping y netcat</li><li>Tráfico HTTP real</li></ul>
      </div>
    </div>
  `,
  // Slide 2 – Dockerfile
  `
    <h1>Código Fuente</h1>
    <h2>Dockerfile</h2>
    <pre>FROM ubuntu:24.04

ENV DEBIAN_FRONTEND=noninteractive

RUN apt-get update && \\
    apt-get install -y \\
    iproute2 \\
    iputils-ping \\
    iptables \\
    net-tools \\
    tcpdump \\
    netcat-openbsd \\
    curl \\
    nginx \\
    vsftpd \\
    mariadb-server \\
    && rm -rf /var/lib/apt/lists/*

CMD ["/bin/bash"]</pre>
  `,
  // Slide 3 – firewall.sh
  `
    <h1>Código Fuente</h1>
    <h2>firewall.sh</h2>
    <pre>#!/bin/bash

echo "[+] Activando IP Forwarding"
echo 1 > /proc/sys/net/ipv4/ip_forward

echo "[+] Limpiando reglas"
iptables -F
iptables -X

echo "[+] Politica DROP por defecto"
iptables -P INPUT DROP
iptables -P OUTPUT DROP
iptables -P FORWARD DROP


#################################
# BASICAS
#################################

iptables -A INPUT  -i lo -j ACCEPT
iptables -A OUTPUT -o lo -j ACCEPT

iptables -A INPUT \\
  -m conntrack --ctstate ESTABLISHED,RELATED \\
  -j ACCEPT

iptables -A OUTPUT \\
  -m conntrack --ctstate ESTABLISHED,RELATED \\
  -j ACCEPT

iptables -A FORWARD \\
  -m conntrack --ctstate ESTABLISHED,RELATED \\
  -j ACCEPT


#################################
# ADMINISTRACION DEL FIREWALL
#################################

iptables -A INPUT  -p icmp -j ACCEPT
iptables -A OUTPUT -p icmp -j ACCEPT


#################################
# REGLA 1: LAN <-> DMZ
#################################

iptables -A FORWARD \\
  -s 172.32.1.0/24 -d 172.31.1.0/24 \\
  -j ACCEPT

iptables -A FORWARD \\
  -s 172.31.1.0/24 -d 172.32.1.0/24 \\
  -j ACCEPT


#################################
# REGLA 2: DMZ <-> WAN
#################################

# FTP -> WAN (todo permitido)
iptables -A FORWARD \\
  -s 172.31.1.3 -d 192.168.10.0/24 \\
  -j ACCEPT

# WAN -> FTP (todo permitido)
iptables -A FORWARD \\
  -s 192.168.10.0/24 -d 172.31.1.3 \\
  -j ACCEPT


#################################
# REGLA 3: LAN <-> WAN
#################################

iptables -A FORWARD \\
  -s 172.32.1.2 -d 192.168.10.2 \\
  -j ACCEPT


echo "[+] Firewall cargado correctamente"
echo ""
echo "[+] Reglas activas:"
iptables -L -v -n</pre>
  `,
  // Slide 4 – start_net.sh
  `
    <h1>Código Fuente</h1>
    <h2>start_net.sh</h2>
    <pre>#!/bin/bash

echo "=============================="
echo " LIMPIANDO "
echo "=============================="

docker rm -f firewall web mysql ftp cliente1 cliente2 2>/dev/null
docker network rm wan dmz lan 2>/dev/null

echo "=============================="
echo " CREANDO IMAGEN "
echo "=============================="

docker build -t ubuntu2404 .

echo "=============================="
echo " CREANDO REDES "
echo "=============================="

docker network create --subnet=192.168.10.0/24 wan
docker network create --subnet=172.31.1.0/24 dmz
docker network create --subnet=172.32.1.0/24 lan

################################
# FIREWALL
################################

docker run -dit --name firewall --hostname firewall \\
  --privileged --cap-add=NET_ADMIN --cap-add=NET_RAW \\
  --network wan --ip 192.168.10.3 ubuntu2404

docker network connect --ip 172.31.1.4 dmz firewall
docker network connect --ip 172.32.1.4 lan firewall

################################
# WEB
################################

docker run -dit --name web --hostname web \\
  --cap-add=NET_ADMIN --network wan --ip 192.168.10.2 ubuntu2404

################################
# MYSQL
################################

docker run -dit --name mysql --hostname mysql \\
  --cap-add=NET_ADMIN --network dmz --ip 172.31.1.2 ubuntu2404

################################
# FTP
################################

docker run -dit --name ftp --hostname ftp \\
  --cap-add=NET_ADMIN --network dmz --ip 172.31.1.3 ubuntu2404

################################
# CLIENTES
################################

docker run -dit --name cliente1 --hostname cliente1 \\
  --cap-add=NET_ADMIN --network lan --ip 172.32.1.2 ubuntu2404

docker run -dit --name cliente2 --hostname cliente2 \\
  --cap-add=NET_ADMIN --network lan --ip 172.32.1.3 ubuntu2404

################################
# RUTAS
################################

docker exec cliente1 ip route del default
docker exec cliente1 ip route add default via 172.32.1.4

docker exec cliente2 ip route del default
docker exec cliente2 ip route add default via 172.32.1.4

docker exec mysql ip route del default
docker exec mysql ip route add default via 172.31.1.4

docker exec ftp ip route del default
docker exec ftp ip route add default via 172.31.1.4

docker exec web ip route del default
docker exec web ip route add default via 192.168.10.3

################################
# FIREWALL
################################

docker cp firewall.sh firewall:/firewall.sh
docker exec firewall chmod +x /firewall.sh
docker exec firewall /firewall.sh

################################
# SERVICIOS
################################

docker cp nginx/index.html web:/var/www/html/index.html

docker exec web service nginx start
docker exec ftp service vsftpd start
docker exec mysql service mariadb start

echo ""
echo "=============================="
echo " LABORATORIO LISTO "
echo "=============================="

docker ps

echo ""
echo "=============================="
echo " VERIFICACION RAPIDA DE RUTAS "
echo "=============================="
echo "-- cliente1 --"; docker exec cliente1 ip route
echo "-- cliente2 --"; docker exec cliente2 ip route
echo "-- mysql --";    docker exec mysql ip route
echo "-- ftp --";      docker exec ftp ip route
echo "-- web --";      docker exec web ip route</pre>

    <pre>iptables -P INPUT DROP

    <pre>iptables -A INPUT -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT

iptables -A OUTPUT -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT</pre>

    <h1>Tráfico de Retorno (HTTP real)</h1>
    <h2>Petición HTTP desde cliente1 al Servidor Web</h2>
    <pre>docker exec cliente1 bash -c 'printf "GET / HTTP/1.0\\r\\n\\r\\n" | nc -w 2 192.168.10.2 80'</pre>
    <p style="color:var(--text-silver);"><strong>Respuesta obtenida:</strong></p>
    <pre>HTTP/1.1 200 OK
Server: nginx/1.24.0 (Ubuntu)
...
&lt;!DOCTYPE html&gt;
&lt;html&gt;
&lt;head&gt;&lt;title&gt;Proyecto Final&lt;/title&gt;&lt;/head&gt;
&lt;body&gt;
&lt;h1&gt;Servidor WEB&lt;/h1&gt;
&lt;h2&gt;Firewall Docker&lt;/h2&gt;
&lt;p&gt;Alumno: CHAVEZ HUAMAN ADRIAN&lt;/p&gt;
&lt;/body&gt;
&lt;/html&gt;</pre>

    <h1>Conclusiones</h1>
    <div class="grid-2">
      <div class="card">
        <h3>✔ Segmentación efectiva</h3>
        <p style="color:var(--text-silver);">Tres redes Docker independientes con un único punto de enrutamiento y filtrado.</p>
      </div>
      <div class="card">
        <h3>✔ Política whitelist estricta</h3>
        <p style="color:var(--text-silver);">La política DROP por defecto garantiza que solo el tráfico autorizado fluye entre zonas.</p>
      </div>
      <div class="card">
        <h3>✔ Filtrado por IP y puerto</h3>
        <p style="color:var(--text-silver);">Las reglas discriminan correctamente origen, destino y servicio (puerto TCP).</p>
      </div>
      <div class="card">
        <h3>✔ Conntrack funcional</h3>
        <p style="color:var(--text-silver);"><code>conntrack</code> con <code>ESTABLISHED,RELATED</code> permite el retorno de tráfico legítimo sin abrir accesos innecesarios.</p>
      </div>
    </div>

  `,
  // Slide 18 – Cierre
  `
    <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; height:100%;">

      <h1 style="font-size:2.5rem; text-align:center;">Firewall Centralizado</h1>
      <h2 style="border:none; font-size:1.5rem; color:var(--text-silver); margin-top:0.5rem; text-align:center;">Topología WAN · DMZ · LAN</h2>

      <div style="margin-top:2rem; font-family:'Playfair Display',serif; font-weight:700; font-size:1.8rem; color:var(--accent-dark);">GRACIAS POR SU ATENCIÓN</div>
      <div style="color:var(--text-muted); font-size:0.9rem; margin-top:1rem;">CHAVEZ HUAMAN ADRIAN / PAREDES INGA JUAN · Redes y Seguridad · 2026</div>
    </div>
  `
];

// ============================================================
//  LOGICA DE NAVEGACIÓN (NO CAMBIA)
// ============================================================
let currentSlide = 0;
const container = document.getElementById('slidesContainer');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const pageIndicator = document.getElementById('pageIndicator');

function renderSlides() {
  container.innerHTML = '';
  slides.forEach((html, idx) => {
    const div = document.createElement('div');
    div.className = 'slide' + (idx === currentSlide ? ' active' : '');
    div.innerHTML = html;
    container.appendChild(div);
  });
  pageIndicator.textContent = `${String(currentSlide + 1).padStart(2,'0')} / ${slides.length}`;
  prevBtn.disabled = currentSlide === 0;
  nextBtn.disabled = currentSlide === slides.length - 1;
}

function goTo(index) {
  if (index < 0 || index >= slides.length) return;
  currentSlide = index;
  const allSlides = document.querySelectorAll('.slide');
  allSlides.forEach((s, i) => s.classList.toggle('active', i === currentSlide));
  pageIndicator.textContent = `${String(currentSlide + 1).padStart(2,'0')} / ${slides.length}`;
  prevBtn.disabled = currentSlide === 0;
  nextBtn.disabled = currentSlide === slides.length - 1;
}

prevBtn.addEventListener('click', () => goTo(currentSlide - 1));
nextBtn.addEventListener('click', () => goTo(currentSlide + 1));
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') { e.preventDefault(); goTo(currentSlide + 1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goTo(currentSlide - 1); }
});

renderSlides();
</script>
